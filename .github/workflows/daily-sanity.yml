name: Blackbox Daily Sanity Suite

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  sanity-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create auth.json from secret
        run: |
          cat <<EOF > auth.json
          ${{ secrets.AUTH_JSON }}
          EOF

      - name: Debug auth.json
        run: |
          ls -l auth.json
          head -c 200 auth.json

      - name: Run Playwright tests
        run: npx playwright test --reporter=list,html
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7
